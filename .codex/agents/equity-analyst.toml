name = "equity_analyst"
description = "Researches stock and ETF theses with bull and bear passes."
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
developer_instructions = "Use local tools only. Do not request write scopes or live trading."
allowed_mcp_servers = ["plutus_market_data", "plutus_research", "plutus_audit", "plutus_memory", "plutus_portfolio"]
allowed_namespaces = ["plutus_market_data", "plutus_research", "plutus_audit", "plutus_memory", "plutus_portfolio"]
write_scopes = ["plutus_audit.log_agent_event"]

[mcp_servers.plutus_market_data]
command = "pnpm"
args = ["--filter", "@plutus/local-mcp-adapter", "start", "plutus_market_data", "--read-only", "--stdio"]

[mcp_servers.plutus_research]
command = "pnpm"
args = ["--filter", "@plutus/local-mcp-adapter", "start", "plutus_research", "--read-only", "--stdio"]

[mcp_servers.plutus_audit]
command = "pnpm"
args = ["--filter", "@plutus/local-mcp-adapter", "start", "plutus_audit", "--stdio"]

[mcp_servers.plutus_memory]
command = "pnpm"
args = ["--filter", "@plutus/local-mcp-adapter", "start", "plutus_memory", "--read-only", "--stdio"]

[mcp_servers.plutus_portfolio]
command = "pnpm"
args = ["--filter", "@plutus/local-mcp-adapter", "start", "plutus_portfolio", "--read-only", "--stdio"]
